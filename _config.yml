name: Mathematics and Computation
description: A blog about mathematics for computers
url: "https://math.andrej.com"

kramdown:
  hard_wrap: false
  input: Markdown
  math_engine:

exclude:
  - publish.sh
  - Gemfile
  - Gemfile.lock
  - README.markdown
  - etc/

plugins:
  - jekyll-archives
  - jekyll-redirect-from
  - jekyll-paginate
  - jekyll-feed

paginate: 10

paginate_path: "page-:num/"

permalink: /:year/:month/:day/:slug/

excerpt_separator: "<!--more-->"

jekyll-archives:
  enabled:
    - categories
    - year
  layouts:
    year: archive-year
    category: archive-category
  permalinks:
    year: '/:year/'
    month: '/:year/:month/'
    day: '/:year/:month/:day/'
    tag: '/tag/:name/'
    category: '/category/:name/'
